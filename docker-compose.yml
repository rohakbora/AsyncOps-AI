version: "3.9"
services:
  mongodb:
    image: mongo:7
    container_name: ai_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: ai_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: ai_backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/ai_task_platform
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_QUEUE_KEY: task_jobs
    depends_on:
      - mongodb
      - redis

  worker:
    build:
      context: ./worker
    container_name: ai_worker
    environment:
      MONGO_URI: mongodb://mongodb:27017/ai_task_platform
      MONGO_DB_NAME: ai_task_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_QUEUE_KEY: task_jobs
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: ai_frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  mongo_data:
