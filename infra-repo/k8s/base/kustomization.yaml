apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai-task-platform
resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - mongodb.yaml
  - redis.yaml
  - backend.yaml
  - worker.yaml
  - frontend.yaml
  - ingress.yaml
images:
  - name: YOUR_DOCKERHUB_USERNAME/ai-task-backend
    newTag: latest
  - name: YOUR_DOCKERHUB_USERNAME/ai-task-worker
    newTag: latest
  - name: YOUR_DOCKERHUB_USERNAME/ai-task-frontend
    newTag: latest
