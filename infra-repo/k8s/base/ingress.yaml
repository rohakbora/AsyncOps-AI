apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-task-ingress
  namespace: ai-task-platform
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: ai-task.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
